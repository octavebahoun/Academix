<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcademiX - Dashboard de Test API</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background-color: var(--card-bg);
            border-right: 1px solid #334155;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            box-sizing: border-box;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .config-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        input,
        select,
        textarea {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 0.75rem;
            border-radius: 0.5rem;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-align: center;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #334155;
            color: white;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 3rem;
            overflow-y: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 2rem;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        /* Logs / Terminal */
        .terminal {
            margin-top: 2rem;
            background: #000;
            border-radius: 0.75rem;
            padding: 1.5rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #334155;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .log-req {
            color: #facc15;
        }

        .log-res-ok {
            color: #4ade80;
        }

        .log-res-err {
            color: #f87171;
        }

        .log-timestamp {
            color: #64748b;
            font-size: 0.75rem;
        }

        .token-display {
            background: #0f172a;
            padding: 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.8rem;
            word-break: break-all;
            color: var(--warning);
            margin-top: 0.5rem;
        }

        .status-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-online {
            background: #064e3b;
            color: #6ee7b7;
        }

        .status-offline {
            background: #7f1d1d;
            color: #fca5a5;
        }

        .image-preview {
            margin-top: 1rem;
            max-width: 100%;
            border-radius: 0.5rem;
            display: none;
            border: 2px solid var(--primary);
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="logo">🚀 AcademiX Test Hub</div>

        <div class="config-item">
            <label>API Laravel (Auth/CRUD)</label>
            <input type="text" id="laravel_url" value="http://127.0.0.1:8000/api/v1">
        </div>
        <div class="config-item">
            <label>API Python (AI)</label>
            <input type="text" id="python_url" value="http://127.0.0.1:5000/api/v1">
        </div>
        <div class="config-item">
            <label>API Node (Socket/Chat)</label>
            <input type="text" id="node_url" value="http://127.0.0.1:3001/api">
        </div>

        <hr style="border: 0; border-top: 1px solid #334155; margin: 1rem 0;">

        <div class="config-item">
            <label>Token Actuel</label>
            <div id="token_status" class="token-display">Aucun token</div>
            <button class="btn btn-secondary" onclick="clearToken()" style="margin-top:0.5rem">Effacer session</button>
        </div>

        <div style="margin-top: auto;">
            <div id="api_health" style="font-size: 0.8rem; display: flex; flex-direction: column; gap: 0.5rem;">
                <div>Laravel: <span id="h_laravel" class="status-badge status-offline">...</span></div>
                <div>Python: <span id="h_python" class="status-badge status-offline">...</span></div>
                <div>Node: <span id="h_node" class="status-badge status-offline">...</span></div>
            </div>
            <button class="btn btn-secondary" style="width:100%; margin-top:1rem" onclick="checkHealth()">Scanner
                Santé</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="grid">

            <!-- SECTION AUTH -->
            <div class="card">
                <h2>🔐 Authentification</h2>
                <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                    <button class="btn btn-primary" onclick="showForm('login')">Login</button>
                    <button class="btn btn-secondary" onclick="showForm('register')">Register Admin</button>
                </div>

                <div id="login_form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login_email" value="octave@gmail.com">
                    </div>
                    <div class="form-group">
                        <label>Mot de passe</label>
                        <input type="password" id="login_pass" value="Test1234!">
                    </div>
                    <div class="form-group">
                        <label>Rôle</label>
                        <select id="login_role">
                            <option value="admin">Super Admin</option>
                            <option value="chef">Chef Département</option>
                            <option value="student">Étudiant</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" style="width:100%" onclick="login()">Se connecter</button>
                </div>

                <div id="register_form" style="display:none">
                    <div class="form-group">
                        <label>Nom & Prénom</label>
                        <div style="display:flex; gap:0.5rem">
                            <input type="text" id="reg_nom" placeholder="Nom">
                            <input type="text" id="reg_prenom" placeholder="Prénom">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="reg_email">
                    </div>
                    <div class="form-group">
                        <label>Mot de passe</label>
                        <input type="password" id="reg_pass">
                    </div>
                    <div class="form-group">
                        <label>Confirmation</label>
                        <input type="password" id="reg_pass_conf">
                    </div>
                    <button class="btn btn-primary" style="width:100%" onclick="registerAdmin()">Créer Admin</button>
                </div>
            </div>

            <!-- SECTION AI CHAT -->
            <div class="card">
                <h2>🤖 Python AI - Chat (RAG)</h2>
                <div class="form-group">
                    <label>Votre Question</label>
                    <textarea id="ai_question" rows="3" placeholder="Posez une question sur vos cours..."></textarea>
                </div>
                <button class="btn btn-primary" style="width:100%" onclick="aiChat()">Envoyer à l'IA</button>
                <div id="ai_answer_box"
                    style="margin-top:1rem; font-size: 0.9rem; border-left: 3px solid var(--primary); padding-left: 1rem; display:none;">
                    <b>Réponse:</b> <span id="ai_answer"></span>
                </div>
            </div>

            <!-- SECTION IMAGE GEN -->
            <div class="card">
                <h2>🎨 Python AI - Génération d'Image</h2>
                <div class="form-group">
                    <label>Prompt (Description)</label>
                    <input type="text" id="img_prompt" placeholder="Ex: Un cerveau futuriste entouré de livres...">
                </div>
                <button class="btn btn-primary" style="width:100%" onclick="generateImage()">Générer</button>
                <img id="image_result" src="" class="image-preview">
            </div>

            <!-- SECTION SUMMARIES / QUIZ -->
            <div class="card">
                <h2>📝 Python AI - Fiches & Quiz</h2>
                <div class="form-group">
                    <label>Uploader un cours (PDF/TXT)</label>
                    <input type="file" id="ai_file">
                </div>
                <div style="display:flex; gap:0.5rem">
                    <button class="btn btn-secondary" style="flex:1" onclick="uploadForSummary()">Fiche de
                        Révision</button>
                    <button class="btn btn-secondary" style="flex:1" onclick="uploadForQuiz()">Générer Quiz</button>
                </div>
            </div>

        </div>

        <!-- TERMINAL DE LOGS -->
        <div class="terminal">
            <div class="terminal-header">
                <span>Console de Débogage (Requests)</span>
                <button class="btn btn-secondary" style="padding: 0.2rem 0.5rem; font-size: 0.7rem;"
                    onclick="clearLogs()">Vider</button>
            </div>
            <div id="logs_container"></div>
        </div>
    </main>

    <script>
        // Initialisation
        let currentToken = localStorage.getItem('token') || null;
        if (currentToken) updateTokenDisplay();

        function updateTokenDisplay() {
            const el = document.getElementById('token_status');
            if (currentToken) {
                el.innerText = currentToken.substring(0, 15) + '... (Actif)';
                el.style.color = 'var(--success)';
            } else {
                el.innerText = 'Aucun token';
                el.style.color = 'var(--warning)';
            }
        }

        function clearToken() {
            localStorage.removeItem('token');
            currentToken = null;
            updateTokenDisplay();
            log('Session effacée', 'err');
        }

        function clearLogs() {
            document.getElementById('logs_container').innerHTML = '';
        }

        function log(msg, type = 'info') {
            const container = document.getElementById('logs_container');
            const entry = document.createElement('div');
            entry.className = 'log-entry';

            const timestamp = new Date().toLocaleTimeString();
            let colorClass = 'log-req';
            if (type === 'ok') colorClass = 'log-res-ok';
            if (type === 'err') colorClass = 'log-res-err';

            entry.innerHTML = `<span class="log-timestamp">[${timestamp}]</span> <span class="${colorClass}">${msg}</span>`;
            container.prepend(entry);
        }

        function showForm(type) {
            document.getElementById('login_form').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('register_form').style.display = type === 'register' ? 'block' : 'none';
        }

        async function api(url, method = 'GET', body = null, isPython = false) {
            const baseUrl = isPython ? document.getElementById('python_url').value : document.getElementById('laravel_url').value;
            const fullUrl = url.startsWith('http') ? url : baseUrl + url;

            log(`CALL ${method} ${fullUrl}`);

            const headers = { 'Accept': 'application/json' };
            if (currentToken) headers['Authorization'] = `Bearer ${currentToken}`;

            let options = { method, headers };
            if (body) {
                if (body instanceof FormData) {
                    options.body = body;
                } else {
                    headers['Content-Type'] = 'application/json';
                    options.body = JSON.stringify(body);
                }
            }

            try {
                const res = await fetch(fullUrl, options);
                const data = await res.json();

                if (res.ok) {
                    log(`OK (${res.status}): ${JSON.stringify(data).substring(0, 100)}...`, 'ok');
                    return data;
                } else {
                    log(`ERR (${res.status}): ${data.message || JSON.stringify(data)}`, 'err');
                    return null;
                }
            } catch (e) {
                log(`CRASH: ${e.message}`, 'err');
                return null;
            }
        }

        // --- ACTIONS ---

        async function checkHealth() {
            const l = document.getElementById('laravel_url').value.replace('/api/v1', '');
            const p = document.getElementById('python_url').value.replace('/api/v1', '');
            const n = document.getElementById('node_url').value.replace('/api', '');

            const check = async (url, id) => {
                const el = document.getElementById(id);
                el.innerText = 'Checking...';
                try {
                    const res = await fetch(url + '/', { mode: 'cors' });
                    if (res.ok) {
                        el.className = 'status-badge status-online';
                        el.innerText = 'Online';
                    } else throw new Error();
                } catch {
                    el.className = 'status-badge status-offline';
                    el.innerText = 'Offline';
                }
            };

            check(l, 'h_laravel');
            check(p, 'h_python');
            check(n, 'h_node');
        }

        async function login() {
            const role = document.getElementById('login_role').value;
            const endpoint = `/auth/${role}/login`;
            const payload = {
                email: document.getElementById('login_email').value,
                password: document.getElementById('login_pass').value
            };

            const res = await api(endpoint, 'POST', payload);
            if (res && res.token) {
                currentToken = res.token;
                localStorage.setItem('token', currentToken);
                updateTokenDisplay();
                log('Connexion réussie ! Token enregistré.', 'ok');
            }
        }

        async function registerAdmin() {
            const payload = {
                nom: document.getElementById('reg_nom').value,
                prenom: document.getElementById('reg_prenom').value,
                email: document.getElementById('reg_email').value,
                password: document.getElementById('reg_pass').value,
                password_confirmation: document.getElementById('reg_pass_conf').value,
            };
            const res = await api('/auth/admin/register', 'POST', payload);
            if (res) log('Admin créé avec succès !', 'ok');
        }

        // --- PYTHON AI ---

        async function aiChat() {
            const question = document.getElementById('ai_question').value;
            if (!question) return alert('Posez une question');

            const res = await api('/chat', 'POST', { question }, true);
            if (res) {
                document.getElementById('ai_answer_box').style.display = 'block';
                document.getElementById('ai_answer').innerText = res.answer;
            }
        }

        async function generateImage() {
            const prompt = document.getElementById('img_prompt').value;
            if (!prompt) return alert('Entrez un prompt');

            const res = await api(`/image/generate?prompt=${encodeURIComponent(prompt)}`, 'POST', null, true);
            if (res && res.image_url) {
                const imgUrl = document.getElementById('python_url').value + res.image_url;
                const imgEl = document.getElementById('image_result');

                // Fetch image with Bearer to handle the protection
                const response = await fetch(imgUrl, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const blob = await response.blob();
                const localUrl = URL.createObjectURL(blob);

                imgEl.src = localUrl;
                imgEl.style.display = 'block';
            }
        }

        async function uploadForSummary() {
            const fileInput = document.getElementById('ai_file');
            if (fileInput.files.length === 0) return alert('Sélectionnez un fichier');

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const res = await api('/summary/generate', 'POST', formData, true);
            if (res) alert('Résumé généré avec succès (voir console)');
        }

        async function uploadForQuiz() {
            const fileInput = document.getElementById('ai_file');
            if (fileInput.files.length === 0) return alert('Sélectionnez un fichier');

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const res = await api('/quiz/generate', 'POST', formData, true);
            if (res) alert('Quiz généré avec succès (voir console)');
        }
    </script>
</body>

</html>
